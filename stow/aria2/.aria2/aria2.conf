# aria2 daemon config for browser-extension capture.
# Connect via: http://localhost:6800/jsonrpc  secret: see rpc-secret below.

# --- General ---
dir=${HOME}/Downloads
continue=true
file-allocation=falloc
# Rename instead of erroring when file exists (e.g. browser already grabbed it)
auto-file-renaming=true
allow-overwrite=false
log-level=warn
log=${HOME}/.aria2/aria2.log
console-log-level=warn

# --- Performance: parallel connections ---
max-connection-per-server=16
split=16
min-split-size=1M
max-concurrent-downloads=5
piece-length=1M

# --- RPC (for browser extension) ---
enable-rpc=true
rpc-listen-all=false
rpc-listen-port=6800
rpc-allow-origin-all=true
rpc-secret=changeme-local-only

# --- Session resume across restarts ---
save-session=${HOME}/.aria2/aria2.session
input-file=${HOME}/.aria2/aria2.session
save-session-interval=30
force-save=true

# --- Notification hook on completion ---
on-download-complete=${HOME}/.aria2/notify.sh
on-download-error=${HOME}/.aria2/notify.sh
