# tmux — server profile config. Tuned to feel close to Ghostty:
# mouse on, true color, vim-style pane nav, minimal status bar, long scrollback.

# ---------- core ----------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -ga terminal-overrides ",*256col*:RGB"
set -g focus-events on
set -g mouse on
set -sg escape-time 10                 # snappy ESC, no vi-mode lag
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g status-interval 5

# ---------- prefix ----------
# C-a is more reachable than the default C-b. Pass-through C-a with C-a a.
unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind a   send-prefix

# ---------- splits — keep working directory ----------
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window      -c "#{pane_current_path}"

# ---------- vim-style pane navigation ----------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize with shifted vim keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

# ---------- reload + quick window switching ----------
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"
bind Tab last-window

# ---------- no-prefix one-shot bindings (Alt+key) ----------
# Portable across terminals — every terminal forwards ESC+key as Alt. macOS
# Ghostty separately maps Cmd+Shift+<key> to the same ESC+<key> sequences (see
# stow/config/.config/ghostty/config) so you also get thumb-rest combos locally.

# Pane navigation
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Window switching (digits + n/p/Tab)
bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9
bind -n M-n next-window
bind -n M-p previous-window
bind -n M-Tab last-window

# Lifecycle
bind -n M-d detach
bind -n M-r command-prompt "rename-window '%%'"
bind -n M-R source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# ---------- copy mode (vi keys, sync to system clipboard via OSC52) ----------
setw -g mode-keys vi
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ---------- visual ----------
# Subtle dark scheme — readable on tiny SBC consoles via SSH.
set -g status-position bottom
set -g status-style "bg=default,fg=#9ca0b0"
set -g status-justify left
set -g status-left  "#[fg=#7aa2f7,bold] #h #[fg=#3b4261]│ "
set -g status-right "#[fg=#9ca0b0]load #(uptime | awk -F'load average: *' '{print $2}' | awk -F, '{print $1}')  #[fg=#3b4261]│ #[fg=#7dcfff]%H:%M"
set -g status-left-length 40
set -g status-right-length 80

setw -g window-status-format         " #I #W "
setw -g window-status-current-format "#[fg=#bb9af7,bold] #I #W "
setw -g window-status-current-style  "bg=default"

set -g pane-border-style         "fg=#3b4261"
set -g pane-active-border-style  "fg=#7aa2f7"

set -g message-style "bg=#3b4261,fg=#c0caf5"
